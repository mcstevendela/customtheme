<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Timber Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f1f1f1; }
        .error { background: white; padding: 30px; border-left: 4px solid #dc3232; }
        h1 { color: #dc3232; }
        code { background: #f0f0f0; padding: 2px 6px; }
    </style>
</head>
<body>
    <div class="error">
        <h1>Timber Not Activated</h1>
        <p><strong>This theme requires Timber to function properly.</strong></p>
        <p>Please ensure Timber is installed via Composer:</p>
        <pre><code>composer install</code></pre>
        <p>If you're still seeing this error, Timber may not be loading correctly. Check your <code>functions.php</code> file.</p>
    </div>
</body>
</html>
